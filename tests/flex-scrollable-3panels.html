<!DOCTYPE html>
<html class="no-js">
    <head>
        <meta charset="utf-8">
        <title>Independent CSS scrolling panels (with inertia)</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{-webkit-box-sizing:border-box;box-sizing:border-box;}
body{overflow-x:hidden;}
html,body{padding:0;margin:0;}
p {
    margin:200px 20px;
}
.Top{
    display:-webkit-box;
    display:-webkit-flex;
    display:-ms-flexbox;
    display:flex;
    -webkit-box-align:center;
    -webkit-align-items:center;
    -ms-flex-align:center;
    align-items:center;
    -webkit-box-pack:center;
    -webkit-justify-content:center;
    -ms-flex-pack:center;
    justify-content:center;
    font-size:3rem;
    position:relative;
    z-index:10;
    height:100px;
    background: #ddd;
}
.Container{
    display:-webkit-box;
    display:-webkit-flex;
    display:-ms-flexbox;
    display:flex;
    overflow:hidden;
    height:100vh;
    margin-top:-100px;
    padding-top:100px;
    position:relative;
    width:100%;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
}
.Left,.Middle,.Right{
    overflow-y:auto;
    height:auto;
    padding:.5rem;
    -webkit-overflow-scrolling:touch;
}
/*.Left::-webkit-scrollbar,.Middle::-webkit-scrollbar,.Right::-webkit-scrollbar{
    display:none;
}*/
.Left{
    width:12.5rem;
    background-color:skyblue;
}
.Middle{
    -webkit-box-flex:1;
    -webkit-flex:1;
    -ms-flex:1;
    flex:1;
}
.Right{
    width:12.5rem;
    background-color:tan;
}
@media (max-width: 480px) {
    .Container {
        display: block;
        overflow: visible;
    }
    .Left,.Middle,.Right {
        display: block;
        border: 1px solid tomato;
        flex: 0 0 auto; /* none */
        width: 100%;
    }
}
</style>
    </head>
    <body>

<!-- 
// Example based on
// http://benfrain.com/independent-scrolling-panels-body-scroll-using-just-css/
// --> 

    <div class="Top">Top Content</div>
    <div class="Container">
        <div class="Left">
            <p>Left Content</p>
            <p>Left Content</p>
            <p>Left Content</p>
            </div>
        <div class="Middle">
            <p>Middle Content</p>
            <p>Middle Content</p>
            <p>Middle Content</p>
        </div>
        <div class="Right">
            <p>Right Content</p>
            <p>Right Content</p>
            <p>Right Content</p>
        </div>
    </div>
    </body>
</html>
